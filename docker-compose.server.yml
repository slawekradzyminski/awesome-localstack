name: awesome-server

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  backend:
    image: slawekradzyminski/backend:3.7.12@sha256:39809b9e9fdc05fe33294357e5f91c5c37feb1afd60eefda6d2ae580b88bae80
    restart: unless-stopped
    hostname: backend
    logging: *default-logging
    env_file:
      - path: .env.runtime
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: docker,server
      SPRING_ARTEMIS_BROKER_URL: tcp://activemq:61616
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/testdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      SECURITY_RATE_LIMIT_ENABLED: "true"
      SECURITY_RATE_LIMIT_TRUST_FORWARDED_HEADERS: "true"
      SECURITY_RATE_LIMIT_SIGNUP_IP_CAPACITY: "200"
      SECURITY_RATE_LIMIT_SIGNIN_IP_CAPACITY: "400"
      SECURITY_RATE_LIMIT_SIGNIN_USERNAME_CAPACITY: "200"
      SECURITY_RATE_LIMIT_SIGNIN_IP_USERNAME_CAPACITY: "100"
      SECURITY_RATE_LIMIT_MFA_IP_CAPACITY: "60"
      SECURITY_RATE_LIMIT_MFA_CHALLENGE_CAPACITY: "8"
      SECURITY_RATE_LIMIT_MFA_USER_CAPACITY: "30"
      SECURITY_RATE_LIMIT_PASSWORD_FORGOT_IP_CAPACITY: "200"
      SECURITY_RATE_LIMIT_PASSWORD_FORGOT_IDENTIFIER_CAPACITY: "60"
      SECURITY_RATE_LIMIT_PASSWORD_RESET_IP_CAPACITY: "200"
      SECURITY_RATE_LIMIT_REFRESH_IP_CAPACITY: "1200"
      SECURITY_RATE_LIMIT_EMAIL_USER_CAPACITY: "600"
      SECURITY_RATE_LIMIT_QR_USER_CAPACITY: "1200"
      SECURITY_RATE_LIMIT_OLLAMA_USER_CAPACITY: "400"
      SECURITY_RATE_LIMIT_OLLAMA_IP_CAPACITY: "400"
      OLLAMA_BASE_URL: http://ollama-mock:11434
      PASSWORD_RESET_FRONTEND_BASE_URL: https://awesome.byst.re/reset
      SWAGGER_UI_OAUTH2_REDIRECT_URL: https://awesome.byst.re/swagger-ui/oauth2-redirect.html
      APP_SSO_ENABLED: "false"
      APP_MFA_REQUIRE_SECURE_ENCRYPTION: "true"
      JWT_REQUIRE_SECURE_KEY: "true"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: http://awesome.byst.re,https://awesome.byst.re,http://localhost:8081,http://127.0.0.1:8081,http://host.docker.internal:8081
    depends_on:
      postgres:
        condition: service_healthy
      activemq:
        condition: service_started
      ollama-mock:
        condition: service_started
    expose:
      - "4001"
    networks:
      - my-private-ntwk

  frontend:
    # Release independently from aitesters-frontend. Do not update both tags
    # unless the AI Lab route is intentionally enabled on both hostnames.
    image: slawekradzyminski/frontend:3.7.9@sha256:6a6e2fc9eb1d3c4bd1d9cc3845d68998812ca7ca93c01f42d543ab5b73afcc03
    restart: unless-stopped
    logging: *default-logging
    expose:
      - "80"
    networks:
      - my-private-ntwk

  ai-learning-lab:
    image: ${AI_LAB_IMAGE:-slawekradzyminski/ai-learning-lab:0.1.4@sha256:35ef645bc30dde3cd63f9735e3efcb6a59ab3440ce951f6c3bcafead4763f470}
    restart: unless-stopped
    logging: *default-logging
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - my-private-ntwk

  aitesters-backend:
    image: slawekradzyminski/backend:3.7.9
    restart: unless-stopped
    hostname: aitesters-backend
    logging: *default-logging
    env_file:
      - path: .env.runtime
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: aitesters
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      OLLAMA_BASE_URL: http://ollama-mock:11434
      PASSWORD_RESET_FRONTEND_BASE_URL: https://aitesters.byst.re/reset
      SWAGGER_UI_OAUTH2_REDIRECT_URL: https://aitesters.byst.re/swagger-ui/oauth2-redirect.html
      APP_SSO_ENABLED: "false"
      APP_BOOTSTRAP_ADMIN_ENABLED: "false"
      APP_MFA_REQUIRE_SECURE_ENCRYPTION: "true"
      JWT_REQUIRE_SECURE_KEY: "true"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
      SECURITY_RATE_LIMIT_ENABLED: "true"
      SECURITY_RATE_LIMIT_TRUST_FORWARDED_HEADERS: "true"
      SECURITY_RATE_LIMIT_MFA_IP_CAPACITY: "60"
      SECURITY_RATE_LIMIT_MFA_CHALLENGE_CAPACITY: "8"
      SECURITY_RATE_LIMIT_MFA_USER_CAPACITY: "30"
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: http://aitesters.byst.re,https://aitesters.byst.re,http://aitesters.awesome.byst.re,https://aitesters.awesome.byst.re
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=70 -XX:InitialRAMPercentage=20"
    depends_on:
      ollama-mock:
        condition: service_started
    expose:
      - "4001"
    mem_limit: 768m
    networks:
      - my-private-ntwk

  aitesters-frontend:
    # Kept on the recorded-course-compatible baseline until the aitesters host
    # receives an explicit /learn routing decision.
    image: slawekradzyminski/frontend:3.7.6
    restart: unless-stopped
    logging: *default-logging
    expose:
      - "80"
    networks:
      - my-private-ntwk

  gateway:
    image: nginx:1.31.2-trixie
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
      ai-learning-lab:
        condition: service_healthy
      aitesters-frontend:
        condition: service_started
      aitesters-backend:
        condition: service_started
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx/conf.d/app-gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./images:/usr/share/nginx/html/images:ro
      - ./branding:/usr/share/nginx/html/branding:ro
      - ./nginx/conf.d/header-buffers.conf:/etc/nginx/conf.d/header-buffers.conf:ro
    networks:
      - my-private-ntwk

  edge:
    image: nginx:1.31.2-trixie
    restart: unless-stopped
    network_mode: host
    logging: *default-logging
    depends_on:
      - gateway
    volumes:
      - ./nginx/conf.d/edge-gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/conf.d/header-buffers.conf:/etc/nginx/conf.d/header-buffers.conf:ro

  prometheus:
    image: prom/prometheus:v3.13.0
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./prometheus/:/etc/prometheus/:ro
    depends_on:
      - backend
      - consumer
    expose:
      - "9090"
    networks:
      - my-private-ntwk

  grafana:
    image: grafana/grafana:13.1.0
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - path: .env.runtime
        required: false
    volumes:
      - ./grafana/server-provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./grafana/server-provisioning/dashboards/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
      - ./grafana/provisioning/dashboards/spring_dashboard.json:/etc/grafana/provisioning/dashboards/spring_dashboard.json:ro
      - ./grafana/provisioning/dashboards/spring_http_dashboard.json:/etc/grafana/provisioning/dashboards/spring_http_dashboard.json:ro
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - my-private-ntwk

  postgres:
    image: postgres:16.14-bookworm
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d testdb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - my-private-ntwk

  activemq:
    image: apache/activemq-artemis:2.42.0
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - path: .env.runtime
        required: false
    environment:
      ANONYMOUS_LOGIN: "false"
      EXTRA_ARGS: --http-host 0.0.0.0 --relax-jolokia --no-autotune
      BROKER_CONFIG_GLOBAL_MAX_SIZE: 256mb
    expose:
      - "61616"
      - "8161"
    hostname: activemq
    networks:
      - my-private-ntwk

  mailpit:
    image: axllent/mailpit:v1.30.0
    restart: unless-stopped
    logging: *default-logging
    environment:
      MP_DISABLE_VERSION_CHECK: "true"
    ports:
      - "127.0.0.1:8025:8025"
    expose:
      - "1025"
    hostname: mailpit
    networks:
      - my-private-ntwk

  consumer:
    image: slawekradzyminski/consumer:3.3.5@sha256:1da0e051f9fba1492e6597ae385aee64a78ebc434928bddd84bd1fd8a222fe96
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - path: .env.runtime
        required: false
    environment:
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: "1025"
    expose:
      - "4002"
    hostname: consumer
    depends_on:
      activemq:
        condition: service_started
      mailpit:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - my-private-ntwk

  ollama-mock:
    image: slawekradzyminski/ollama-mock:1.0.7@sha256:623170cfb5bbe18b8584ca3683c69023af2267d3534812136eecef39e10f9872
    restart: unless-stopped
    logging: *default-logging
    expose:
      - "11434"
    networks:
      - my-private-ntwk

volumes:
  postgres-data:

networks:
  my-private-ntwk:
    driver: bridge
