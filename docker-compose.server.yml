name: awesome-server

services:
  backend:
    image: slawekradzyminski/backend:3.6.9
    restart: unless-stopped
    hostname: backend
    env_file:
      - path: .env.runtime
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: docker,server
      SPRING_ARTEMIS_BROKER_URL: tcp://activemq:61616
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/testdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      SECURITY_RATE_LIMIT_ENABLED: "true"
      SECURITY_RATE_LIMIT_TRUST_FORWARDED_HEADERS: "true"
      SECURITY_RATE_LIMIT_SIGNUP_IP_CAPACITY: "200"
      SECURITY_RATE_LIMIT_SIGNIN_IP_CAPACITY: "400"
      SECURITY_RATE_LIMIT_SIGNIN_USERNAME_CAPACITY: "200"
      SECURITY_RATE_LIMIT_SIGNIN_IP_USERNAME_CAPACITY: "100"
      SECURITY_RATE_LIMIT_PASSWORD_FORGOT_IP_CAPACITY: "200"
      SECURITY_RATE_LIMIT_PASSWORD_FORGOT_IDENTIFIER_CAPACITY: "60"
      SECURITY_RATE_LIMIT_PASSWORD_RESET_IP_CAPACITY: "200"
      SECURITY_RATE_LIMIT_REFRESH_IP_CAPACITY: "1200"
      SECURITY_RATE_LIMIT_EMAIL_USER_CAPACITY: "600"
      SECURITY_RATE_LIMIT_QR_USER_CAPACITY: "1200"
      SECURITY_RATE_LIMIT_OLLAMA_USER_CAPACITY: "400"
      SECURITY_RATE_LIMIT_OLLAMA_IP_CAPACITY: "400"
      OLLAMA_BASE_URL: http://ollama-mock:11434
      PASSWORD_RESET_FRONTEND_BASE_URL: https://awesome.byst.re/reset
      SWAGGER_UI_OAUTH2_REDIRECT_URL: https://awesome.byst.re/swagger-ui/oauth2-redirect.html
      APP_SSO_ENABLED: "false"
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: http://awesome.byst.re,https://awesome.byst.re,http://localhost:8081,http://127.0.0.1:8081,http://host.docker.internal:8081
    depends_on:
      postgres:
        condition: service_healthy
      activemq:
        condition: service_started
      ollama-mock:
        condition: service_started
    expose:
      - "4001"
    networks:
      - my-private-ntwk

  frontend:
    image: slawekradzyminski/frontend:3.6.7
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - my-private-ntwk

  aitesters-backend:
    image: slawekradzyminski/backend:3.6.9
    restart: unless-stopped
    hostname: aitesters-backend
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      OLLAMA_BASE_URL: http://ollama-mock:11434
      PASSWORD_RESET_FRONTEND_BASE_URL: https://aitesters.byst.re/reset
      SWAGGER_UI_OAUTH2_REDIRECT_URL: https://aitesters.byst.re/swagger-ui/oauth2-redirect.html
      APP_SSO_ENABLED: "false"
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: http://aitesters.byst.re,https://aitesters.byst.re,http://aitesters.awesome.byst.re,https://aitesters.awesome.byst.re
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=70 -XX:InitialRAMPercentage=20"
    depends_on:
      ollama-mock:
        condition: service_started
    expose:
      - "4001"
    mem_limit: 768m
    networks:
      - my-private-ntwk

  aitesters-frontend:
    image: slawekradzyminski/frontend:3.6.7
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - my-private-ntwk

  gateway:
    image: nginx:1.29.7-perl
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - aitesters-frontend
      - aitesters-backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d/app-gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./images:/usr/share/nginx/html/images:ro
      - ./nginx/conf.d/header-buffers.conf:/etc/nginx/conf.d/header-buffers.conf:ro
    networks:
      - my-private-ntwk

  prometheus:
    image: prom/prometheus:v3.1.0
    restart: unless-stopped
    volumes:
      - ./prometheus/:/etc/prometheus/:ro
    depends_on:
      - backend
      - consumer
    expose:
      - "9090"
    networks:
      - my-private-ntwk

  grafana:
    image: grafana/grafana:11.5.1
    restart: unless-stopped
    env_file:
      - path: .env.runtime
        required: false
    volumes:
      - ./grafana/server-provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./grafana/server-provisioning/dashboards/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
      - ./grafana/provisioning/dashboards/spring_dashboard.json:/etc/grafana/provisioning/dashboards/spring_dashboard.json:ro
      - ./grafana/provisioning/dashboards/spring_http_dashboard.json:/etc/grafana/provisioning/dashboards/spring_http_dashboard.json:ro
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - my-private-ntwk

  postgres:
    image: postgres:16.1
    restart: unless-stopped
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d testdb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - my-private-ntwk

  activemq:
    image: apache/activemq-artemis:2.31.2
    restart: unless-stopped
    env_file:
      - path: .env.runtime
        required: false
    environment:
      ANONYMOUS_LOGIN: "false"
      EXTRA_ARGS: --http-host 0.0.0.0 --relax-jolokia --no-autotune
      BROKER_CONFIG_GLOBAL_MAX_SIZE: 256mb
    expose:
      - "61616"
      - "8161"
    hostname: activemq
    networks:
      - my-private-ntwk

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    ports:
      - "127.0.0.1:8025:8025"
    expose:
      - "1025"
    hostname: mailhog
    networks:
      - my-private-ntwk

  consumer:
    image: slawekradzyminski/consumer:3.3.1
    restart: unless-stopped
    env_file:
      - path: .env.runtime
        required: false
    expose:
      - "4002"
    hostname: consumer
    depends_on:
      activemq:
        condition: service_started
      mailhog:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - my-private-ntwk

  ollama-mock:
    image: slawekradzyminski/ollama-mock:local-qwen35-2b
    restart: unless-stopped
    expose:
      - "11434"
    networks:
      - my-private-ntwk

volumes:
  postgres-data:

networks:
  my-private-ntwk:
    driver: bridge
