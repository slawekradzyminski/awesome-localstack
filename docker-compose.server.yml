services:
  backend:
    image: slawekradzyminski/backend:3.4.1
    restart: unless-stopped
    hostname: backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_ARTEMIS_BROKER_URL: tcp://activemq:61616
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/testdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      OLLAMA_BASE_URL: http://ollama-mock:11434
      PASSWORD_RESET_FRONTEND_BASE_URL: https://awesome.byst.re/reset
      SWAGGER_UI_OAUTH2_REDIRECT_URL: https://awesome.byst.re/swagger-ui/oauth2-redirect.html
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: http://awesome.byst.re,https://awesome.byst.re,http://localhost:8081,http://127.0.0.1:8081,http://host.docker.internal:8081
    depends_on:
      postgres:
        condition: service_healthy
      activemq:
        condition: service_started
      ollama-mock:
        condition: service_started
    expose:
      - "4001"
    networks:
      - my-private-ntwk

  frontend:
    image: slawekradzyminski/frontend:3.4.0
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - my-private-ntwk

  gateway:
    image: nginx:1.29.1-perl
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - nginx-static
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d/app-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - my-private-ntwk

  postgres:
    image: postgres:16.1
    restart: unless-stopped
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d testdb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - my-private-ntwk

  activemq:
    image: apache/activemq-artemis:2.31.2
    restart: unless-stopped
    environment:
      ARTEMIS_USER: admin
      ARTEMIS_PASSWORD: admin
      ANONYMOUS_LOGIN: "true"
      EXTRA_ARGS: --http-host 0.0.0.0 --relax-jolokia --no-autotune
      DISABLE_SECURITY: "true"
      BROKER_CONFIG_GLOBAL_MAX_SIZE: 256mb
    ports:
      - "61616:61616"
      - "8161:8161"
    hostname: activemq
    networks:
      - my-private-ntwk

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    expose:
      - "8025"
      - "1025"
    hostname: mailhog
    networks:
      - my-private-ntwk

  consumer:
    image: slawekradzyminski/consumer:3.3.1
    restart: unless-stopped
    ports:
      - "4002:4002"
    hostname: consumer
    depends_on:
      activemq:
        condition: service_started
      mailhog:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - my-private-ntwk

  ollama-mock:
    image: slawekradzyminski/ollama-mock:1.0.2
    restart: unless-stopped
    expose:
      - "11434"
    networks:
      - my-private-ntwk

  nginx-static:
    image: nginx:1.29.1-perl
    hostname: nginx
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ./images:/usr/share/nginx/html/images:ro
      - ./nginx/conf.d/header-buffers.conf:/etc/nginx/conf.d/header-buffers.conf:ro
    networks:
      - my-private-ntwk

volumes:
  postgres-data:

networks:
  my-private-ntwk:
    driver: bridge
