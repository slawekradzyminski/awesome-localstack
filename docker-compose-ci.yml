name: awesome-ci

services:
  backend:
    image: slawekradzyminski/backend:3.6.10
    restart: always
    expose:
      - "4001"
    hostname: backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_ARTEMIS_BROKER_URL: tcp://activemq:61616
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/testdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      PASSWORD_RESET_FRONTEND_BASE_URL: http://localhost:8081/reset
      SWAGGER_UI_OAUTH2_REDIRECT_URL: http://localhost:8081/swagger-ui/oauth2-redirect.html
      APP_SSO_ENABLED: "true"
      APP_SSO_ISSUER_URI: http://localhost:8082/realms/awesome-testing
      APP_SSO_JWK_SET_URI: http://keycloak:8080/realms/awesome-testing/protocol/openid-connect/certs
      APP_SSO_AUDIENCE: awesome-testing-frontend
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: http://localhost:8081,http://127.0.0.1:8081,http://host.docker.internal:8081
    depends_on:
      - activemq
      - keycloak
      - postgres
    networks:
      - my-private-ntwk

  frontend:
    image: slawekradzyminski/frontend:3.6.8
    restart: always
    expose:
      - "80"
    hostname: frontend
    networks:
      - my-private-ntwk

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: always
    command:
      - start-dev
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8082
    ports:
      - "8082:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    networks:
      - my-private-ntwk

  keycloak-init:
    image: curlimages/curl:8.13.0
    entrypoint: ["/bin/sh", "/init/init-mock-users.sh"]
    volumes:
      - ./keycloak/init-mock-users.sh:/init/init-mock-users.sh:ro
    environment:
      KEYCLOAK_URL: http://keycloak:8080
    depends_on:
      - keycloak
    restart: "no"
    networks:
      - my-private-ntwk

  gateway:
    image: nginx:1.29.7-perl
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "8081:80"
    volumes:
      - ./nginx/conf.d/lightweight-app-gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./images:/usr/share/nginx/html/images:ro
      - ./nginx/conf.d/header-buffers.conf:/etc/nginx/conf.d/header-buffers.conf:ro
    networks:
      - my-private-ntwk

  postgres:
    image: postgres:16.1
    restart: always
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    networks:
      - my-private-ntwk

  activemq:
    image: apache/activemq-artemis:2.31.2
    restart: always
    environment:
      ARTEMIS_USER: admin
      ARTEMIS_PASSWORD: admin
      ANONYMOUS_LOGIN: "true"
      EXTRA_ARGS: --http-host 0.0.0.0 --relax-jolokia --no-autotune
      DISABLE_SECURITY: true
      BROKER_CONFIG_GLOBAL_MAX_SIZE: 512mb
    ports:
      - "61616:61616"
      - "8161:8161"
      - "5672:5672"
    hostname: activemq
    networks:
      - my-private-ntwk

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: always
    ports:
      - "8025:8025"
      - "1025:1025"
    hostname: mailhog
    networks:
      - my-private-ntwk

  consumer:
    image: slawekradzyminski/consumer:3.3.1
    restart: always
    ports:
      - "4002:4002"
    hostname: consumer
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - my-private-ntwk

networks:
  my-private-ntwk:
    driver: bridge
