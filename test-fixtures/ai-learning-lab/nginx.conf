server {
  listen 80;
  server_name _;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # The orchestration repository tests routing and readiness, while the AI Lab
  # repository owns the real application build and course browser tests.
  location / {
    add_header Content-Type text/html;
    return 200 '<!doctype html><html><head><title>AI Learning Lab CI fixture</title></head><body>AI Learning Lab CI fixture</body></html>';
  }
}
