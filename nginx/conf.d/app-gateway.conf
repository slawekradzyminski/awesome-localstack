server {
  listen 80;
  server_name awesome.byst.re;
  absolute_redirect off;

  client_max_body_size 10m;

  location /api/v1/ws-traffic {
    proxy_pass http://backend:4001;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $http_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location /api/v1/ {
    proxy_pass http://backend:4001;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $http_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /swagger-ui/ {
    proxy_pass http://backend:4001;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $http_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /v3/api-docs {
    proxy_pass http://backend:4001;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $http_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Proto https;
  }

  location = /actuator/health {
    proxy_pass http://backend:4001;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $http_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /actuator/ {
    return 404;
  }

  location /images/ {
    alias /usr/share/nginx/html/images/;
    try_files $uri =404;
    access_log off;
  }

  location /branding/ {
    alias /usr/share/nginx/html/branding/;
    try_files $uri =404;
    access_log off;
  }

  location = /learn {
    return 308 /learn/;
  }

  location /learn/ {
    proxy_pass http://ai-learning-lab:80/;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $http_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Prefix /learn;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Proto https;
  }

  location = /mailpit {
    return 404;
  }

  location = /mailpit/api {
    return 404;
  }

  location /mailpit/api/ {
    return 404;
  }

  location /mailpit/ {
    return 404;
  }

  # Keep the retired MailHog routes closed so an old URL cannot fall through
  # to the frontend SPA and appear publicly available.
  location = /mailhog {
    return 404;
  }

  location = /mailhog/api {
    return 404;
  }

  location /mailhog/api/ {
    return 404;
  }

  location /mailhog/ {
    return 404;
  }

  location / {
    proxy_pass http://frontend:80;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $http_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Proto https;
  }
}

