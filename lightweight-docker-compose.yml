services:
  backend:
    image: slawekradzyminski/backend:3.4.1
    restart: always
    expose:
      - "4001"
    hostname: backend
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      OLLAMA_BASE_URL: http://ollama-mock:11434
      PASSWORD_RESET_FRONTEND_BASE_URL: http://localhost:8081/reset
      SWAGGER_UI_OAUTH2_REDIRECT_URL: http://localhost:8081/swagger-ui/oauth2-redirect.html
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: http://localhost:8081,http://127.0.0.1:8081,http://host.docker.internal:8081
    networks:
      - my-private-ntwk

  frontend:
    image: slawekradzyminski/frontend:3.4.0
    restart: always
    expose:
      - "80"
    networks:
      - my-private-ntwk

  gateway:
    image: nginx:1.29.1-perl
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - nginx-static
    ports:
      - "8081:80"
    volumes:
      - ./nginx/conf.d/lightweight-app-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - my-private-ntwk

  ollama-mock:
    image: slawekradzyminski/ollama-mock:1.0.2
    restart: always
    ports:
      - "11434:11434"
    networks:
      - my-private-ntwk

  nginx-static:
    image: nginx:1.29.1-perl
    hostname: nginx
    restart: always
    ports:
      - "8082:80"
    volumes:
      - ./images:/usr/share/nginx/html/images
      - ./nginx/conf.d/header-buffers.conf:/etc/nginx/conf.d/header-buffers.conf:ro
    networks:
      - my-private-ntwk

networks:
  my-private-ntwk:
    driver: bridge
