name: awesome-light

services:
  backend:
    image: slawekradzyminski/backend:3.6.15
    restart: always
    expose:
      - "4001"
    hostname: backend
    environment:
      SPRING_PROFILES_ACTIVE: local
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      OLLAMA_BASE_URL: http://ollama-mock:11434
      PASSWORD_RESET_FRONTEND_BASE_URL: http://localhost:8081/reset
      SWAGGER_UI_OAUTH2_REDIRECT_URL: http://localhost:8081/swagger-ui/oauth2-redirect.html
      APP_SSO_ENABLED: "true"
      APP_SSO_ISSUER_URI: http://localhost:8082/realms/awesome-testing
      APP_SSO_JWK_SET_URI: http://keycloak:8080/realms/awesome-testing/protocol/openid-connect/certs
      APP_SSO_AUDIENCE: awesome-testing-frontend
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: http://localhost:8081,http://127.0.0.1:8081,http://host.docker.internal:8081
    depends_on:
      - keycloak
    healthcheck:
      test:
        - CMD
        - bash
        - -ec
        - >-
          exec 3<>/dev/tcp/127.0.0.1/4001;
          printf 'GET /actuator/health HTTP/1.0\r\nHost: localhost\r\n\r\n' >&3;
          read -r _ status _ <&3;
          test "$$status" = 200
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - my-private-ntwk

  frontend:
    image: slawekradzyminski/frontend:3.6.16
    restart: always
    expose:
      - "80"
    networks:
      - my-private-ntwk

  ai-learning-lab:
    image: ${AI_LAB_IMAGE:-slawekradzyminski/ai-learning-lab:0.1.0@sha256:b11d8a77e11b207f77d7cd9b506635f647cb3951d7eeb97ca5dafddce86b22dc}
    restart: always
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - my-private-ntwk

  keycloak:
    image: quay.io/keycloak/keycloak:26.7.0
    restart: always
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8082
    ports:
      - "8082:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    networks:
      - my-private-ntwk

  keycloak-init:
    image: curlimages/curl:8.13.0
    entrypoint: ["/bin/sh", "/init/init-mock-users.sh"]
    volumes:
      - ./keycloak/init-mock-users.sh:/init/init-mock-users.sh:ro
    environment:
      KEYCLOAK_URL: http://keycloak:8080
    depends_on:
      - keycloak
    restart: "no"
    networks:
      - my-private-ntwk

  gateway:
    image: nginx:1.31.2-trixie
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
      ai-learning-lab:
        condition: service_healthy
    ports:
      - "8081:80"
    volumes:
      - ./nginx/conf.d/lightweight-app-gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./images:/usr/share/nginx/html/images:ro
      - ./branding:/usr/share/nginx/html/branding:ro
      - ./nginx/conf.d/header-buffers.conf:/etc/nginx/conf.d/header-buffers.conf:ro
    networks:
      - my-private-ntwk

  ollama-mock:
    image: slawekradzyminski/ollama-mock:1.0.5
    restart: always
    ports:
      - "11434:11434"
    networks:
      - my-private-ntwk

networks:
  my-private-ntwk:
    driver: bridge
