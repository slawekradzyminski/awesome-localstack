name: awesome-full-native

services:
  backend:
    image: slawekradzyminski/backend:3.7.10@sha256:2706213591b4cd94fcbb6f295ace9c5da6c55acca08fd2f7c63666803c6e9cd9
    restart: always
    expose:
      - "4001"
    hostname: backend
    environment:
      SPRING_PROFILES_ACTIVE: docker,demo
      SPRING_ARTEMIS_BROKER_URL: tcp://activemq:61616
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/testdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      PASSWORD_RESET_FRONTEND_BASE_URL: http://localhost:8081/reset
      SWAGGER_UI_OAUTH2_REDIRECT_URL: http://localhost:8081/swagger-ui/oauth2-redirect.html
      APP_SSO_ENABLED: "true"
      APP_SSO_ISSUER_URI: http://localhost:8082/realms/awesome-testing
      APP_SSO_JWK_SET_URI: http://keycloak:8080/realms/awesome-testing/protocol/openid-connect/certs
      APP_SSO_AUDIENCE: awesome-testing-frontend
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: http://localhost:8081,http://127.0.0.1:8081,http://host.docker.internal:8081
      OLLAMA_BASE_URL: http://ollama-dmr-adapter:11434
      OLLAMA_MAX_TOOL_CALL_ITERATIONS: ${OLLAMA_MAX_TOOL_CALL_ITERATIONS:-8}
    models:
      local_llm:
        endpoint_var: DMR_MODEL_ENDPOINT
        model_var: OLLAMA_MODEL
    depends_on:
      activemq:
        condition: service_started
      keycloak:
        condition: service_started
      ollama-dmr-adapter:
        condition: service_healthy
      postgres:
        condition: service_started
    networks:
      - my-private-ntwk

  ollama-dmr-adapter:
    image: awesome-localstack/ollama-dmr-adapter:local
    build:
      context: ./ollama-dmr-adapter
    restart: unless-stopped
    environment:
      UPSTREAM_HOST: model-runner.docker.internal
      UPSTREAM_PORT: "80"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://model-runner.docker.internal/api/tags', timeout=5).read()
      interval: 10s
      timeout: 6s
      retries: 12
      start_period: 5s
    networks:
      - my-private-ntwk

  frontend:
    image: slawekradzyminski/frontend:3.7.7@sha256:a2a6f65f8c94aba11e071374bc325533c746757bd6ad6bbe0924e19e93c21627
    restart: always
    expose:
      - "80"
    networks:
      - my-private-ntwk

  ai-learning-lab:
    image: ${AI_LAB_IMAGE:-slawekradzyminski/ai-learning-lab:0.1.0@sha256:b11d8a77e11b207f77d7cd9b506635f647cb3951d7eeb97ca5dafddce86b22dc}
    restart: always
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - my-private-ntwk

  keycloak:
    image: quay.io/keycloak/keycloak:26.7.0
    restart: always
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8082
    ports:
      - "8082:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    networks:
      - my-private-ntwk

  keycloak-init:
    image: curlimages/curl:8.21.0
    entrypoint: ["/bin/sh", "/init/init-mock-users.sh"]
    volumes:
      - ./keycloak/init-mock-users.sh:/init/init-mock-users.sh:ro
    environment:
      KEYCLOAK_URL: http://keycloak:8080
    depends_on:
      - keycloak
    restart: "no"
    networks:
      - my-private-ntwk

  gateway:
    image: nginx:1.31.2-trixie
    restart: always
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
      ai-learning-lab:
        condition: service_healthy
    ports:
      - "8081:80"
    volumes:
      - ./nginx/conf.d/lightweight-app-gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./images:/usr/share/nginx/html/images:ro
      - ./branding:/usr/share/nginx/html/branding:ro
      - ./nginx/conf.d/header-buffers.conf:/etc/nginx/conf.d/header-buffers.conf:ro
    networks:
      - my-private-ntwk

  postgres:
    image: postgres:16.14-bookworm
    restart: always
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - my-private-ntwk

  prometheus:
    image: prom/prometheus:v3.13.0
    restart: always
    volumes:
      - ./prometheus/:/etc/prometheus/
    ports:
      - "9090:9090"
    depends_on:
      - backend
    networks:
      - my-private-ntwk

  grafana:
    image: grafana/grafana:13.1.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: grafana
    volumes:
      - ./grafana/provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./grafana/provisioning/dashboards/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
      - ./grafana/provisioning/dashboards/k6-load-testing-results_rev1.json:/etc/grafana/provisioning/dashboards/k6-load-testing-results_rev1.json:ro
      - ./grafana/provisioning/dashboards/spring_dashboard.json:/etc/grafana/provisioning/dashboards/spring_dashboard.json:ro
      - ./grafana/provisioning/dashboards/spring_http_dashboard.json:/etc/grafana/provisioning/dashboards/spring_http_dashboard.json:ro
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - influxdb
    networks:
      - my-private-ntwk

  activemq:
    image: apache/activemq-artemis:2.42.0
    restart: always
    environment:
      ARTEMIS_USER: admin
      ARTEMIS_PASSWORD: admin
      ANONYMOUS_LOGIN: "true"
      EXTRA_ARGS: --http-host 0.0.0.0 --relax-jolokia --no-autotune
      DISABLE_SECURITY: true
      BROKER_CONFIG_GLOBAL_MAX_SIZE: 512mb
    ports:
      - "61616:61616"
      - "8161:8161"
      - "5672:5672"
    hostname: activemq
    networks:
      - my-private-ntwk

  mailpit:
    image: axllent/mailpit:v1.30.0
    restart: always
    environment:
      MP_DISABLE_VERSION_CHECK: "true"
    ports:
      - "8025:8025"
      - "1025:1025"
    hostname: mailpit
    networks:
      - my-private-ntwk

  consumer:
    image: slawekradzyminski/consumer:3.3.3@sha256:60d6dc40846c2437392c953d89c71bcd7fa5c63729bae9d887cc0501fac4d55f
    restart: always
    ports:
      - "4002:4002"
    hostname: consumer
    environment:
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: "1025"
    depends_on:
      activemq:
        condition: service_started
      mailpit:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - my-private-ntwk

  influxdb:
    image: influxdb:1.8
    ports:
      - '8086:8086'
    volumes:
      - influxdb-storage:/var/lib/influxdb
    environment:
      - INFLUXDB_DB=db0
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=admin
    networks:
      - my-private-ntwk

volumes:
  influxdb-storage:
  postgres-data:

models:
  local_llm:
    model: ${OLLAMA_MODEL:-hf.co/prism-ml/Bonsai-27B-gguf:Q1_0}
    context_size: 8192

networks:
  my-private-ntwk:
    driver: bridge
