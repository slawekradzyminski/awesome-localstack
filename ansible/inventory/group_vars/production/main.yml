ansible_host: "{{ production_ssh_host }}"
ansible_port: "{{ production_ssh_port }}"
ansible_user: "{{ production_ssh_user }}"
ansible_ssh_private_key_file: "{{ production_ssh_key_path }}"

app_dir: /opt/awesome-localstack
app_compose_file: docker-compose.server.yml
repo_root: "{{ playbook_dir | dirname | dirname }}"
reset_demo_postgres_volume_name: awesome-server_postgres-data
aitesters_hostname: aitesters.byst.re
aitesters_legacy_hostname: aitesters.awesome.byst.re
aitesters_admin_username: admin
aitesters_admin_password: LocalDemoAdmin123!
aitesters_reset_enabled: true
aitesters_reset_schedule: "*-*-* 03:00:00"
aitesters_reset_log_file: /var/log/aitesters-reset.log

base_packages:
  - ca-certificates
  - curl
  - gnupg
  - openssl
  - rsync

ssh_hardening_enabled: true
ssh_service_name: ssh

docker_apt_arch_map:
  x86_64: amd64
  aarch64: arm64

docker_apt_arch: "{{ docker_apt_arch_map.get(ansible_facts['architecture'], ansible_facts['architecture']) }}"
docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

docker_log_max_size: 10m
docker_log_max_file: "5"

journald_system_max_use: 100M
journald_max_retention_sec: 14day

app_compose_src: docker-compose.server.yml

postgres_backup_enabled: true
postgres_backup_root: /var/backups/awesome-localstack/postgres
postgres_backup_environment_file: /etc/awesome-localstack/postgres-backup.env
postgres_backup_daily_retention: 7
postgres_backup_weekly_retention: 4
postgres_backup_schedule: "*-*-* 02:15:00"
postgres_restore_check_schedule: "Sun *-*-* 04:15:00"
postgres_backup_pre_deploy: true
postgres_backup_remote_target: "{{ backup_remote_target | default('', true) }}"
postgres_backup_encryption_passphrase: "{{ backup_encryption_passphrase | default('', true) }}"
postgres_backup_database: testdb
postgres_backup_user: postgres
postgres_restore_image: postgres:16.14-bookworm

app_copy_paths:
  - nginx
  - grafana
  - prometheus
  - images
  - branding

app_runtime_env:
  GF_SECURITY_ADMIN_PASSWORD: "{{ grafana_admin_password | default('', true) }}"
  ARTEMIS_USER: "{{ artemis_username | default('', true) }}"
  ARTEMIS_PASSWORD: "{{ artemis_password | default('', true) }}"
  SPRING_ARTEMIS_USER: "{{ artemis_username | default('', true) }}"
  SPRING_ARTEMIS_PASSWORD: "{{ artemis_password | default('', true) }}"
  SPRING_ACTIVEMQ_USER: "{{ artemis_username | default('', true) }}"
  SPRING_ACTIVEMQ_PASSWORD: "{{ artemis_password | default('', true) }}"
  APP_BOOTSTRAP_ADMIN_ENABLED: "{{ app_bootstrap_admin_enabled | default('', true) }}"
  APP_BOOTSTRAP_ADMIN_USERNAME: "{{ app_bootstrap_admin_username | default('', true) }}"
  APP_BOOTSTRAP_ADMIN_PASSWORD: "{{ app_bootstrap_admin_password | default('', true) }}"
  APP_BOOTSTRAP_ADMIN_EMAIL: "{{ app_bootstrap_admin_email | default('', true) }}"
  APP_BOOTSTRAP_ADMIN_FIRST_NAME: "{{ app_bootstrap_admin_first_name | default('', true) }}"
  APP_BOOTSTRAP_ADMIN_LAST_NAME: "{{ app_bootstrap_admin_last_name | default('', true) }}"
  APP_MFA_ENCRYPTION_PASSWORD: "{{ app_mfa_encryption_password | default('', true) }}"
  APP_MFA_ENCRYPTION_SALT: "{{ app_mfa_encryption_salt | default('', true) }}"
  JWT_SECRET_KEY: "{{ jwt_secret_key | default('', true) }}"
  LOCAL_EMAIL_OUTBOX_ACCESS_KEY: "{{ local_email_outbox_access_key | default('', true) }}"
  APP_BOOTSTRAP_PRODUCTS_ENABLED: "true"

verify_urls:
  - url: http://127.0.0.1/login
    status_code: 200
  - url: http://127.0.0.1/v3/api-docs
    status_code: 200
  - url: http://127.0.0.1/images/iphone.png
    status_code: 200
  - url: http://127.0.0.1/mailpit/api/v1/messages
    status_code: 404
  - url: http://127.0.0.1/mailpit/
    status_code: 404
  - url: http://127.0.0.1/mailhog/api/v2/messages
    status_code: 404
  - url: http://127.0.0.1/mailhog/
    status_code: 404

verify_retries: 12
verify_delay_seconds: 10
