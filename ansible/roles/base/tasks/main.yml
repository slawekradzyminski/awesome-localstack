- name: Install baseline packages
  ansible.builtin.apt:
    name: "{{ base_packages }}"
    state: present
    update_cache: true

- name: Ensure SSH config override directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: ssh_hardening_enabled | bool

- name: Enforce key-only SSH for root
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/99-awesome-localstack.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      PermitRootLogin prohibit-password
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      ChallengeResponseAuthentication no
      PubkeyAuthentication yes
  notify: Restart SSH
  when: ssh_hardening_enabled | bool

- name: Ensure application directory exists
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure journald config override directory exists
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure journald retention limits
  ansible.builtin.copy:
    dest: /etc/systemd/journald.conf.d/99-awesome-localstack.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Journal]
      SystemMaxUse={{ journald_system_max_use }}
      MaxRetentionSec={{ journald_max_retention_sec }}
  notify: Restart journald

- name: Read current machine id
  ansible.builtin.command: cat /etc/machine-id
  register: current_machine_id
  changed_when: false

- name: Find stale journald machine directories
  ansible.builtin.find:
    paths: /var/log/journal
    file_type: directory
    recurse: false
  register: journald_machine_dirs

- name: Remove stale journald machine directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ journald_machine_dirs.files }}"
  when: item.path | basename != current_machine_id.stdout
