services:
  backend:
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    models: !reset []
    depends_on: !override
      - activemq
      - keycloak
      - ollama
      - postgres

  ollama-dmr-adapter:
    profiles:
      - dmr

  ollama:
    image: slawekradzyminski/ollama-mock:1.0.7@sha256:623170cfb5bbe18b8584ca3683c69023af2267d3534812136eecef39e10f9872
    restart: unless-stopped
    ports:
      - "11434:11434"
    networks:
      - my-private-ntwk
