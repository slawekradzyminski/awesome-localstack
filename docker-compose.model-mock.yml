services:
  backend:
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    models: !reset []
    depends_on: !override
      - activemq
      - keycloak
      - ollama
      - postgres

  ollama-dmr-adapter:
    profiles:
      - dmr

  ollama:
    image: slawekradzyminski/ollama-mock:1.0.5@sha256:2a1af2cbe85a838a6ce1febe00cac8f8bd63cc73f367468dc8c82772f2038e89
    restart: unless-stopped
    ports:
      - "11434:11434"
    networks:
      - my-private-ntwk
