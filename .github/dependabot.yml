version: 2
updates:
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    groups:
      non-major-images:
        update-types:
          - minor
          - patch
  - package-ecosystem: docker
    directory: /ollama
    schedule:
      interval: weekly
    groups:
      non-major-ollama:
        update-types:
          - minor
          - patch
    ignore:
      # Ollama is pre-1.0, so semver-minor releases can contain runtime-breaking changes.
      - dependency-name: ollama/ollama
        update-types:
          - version-update:semver-minor
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
